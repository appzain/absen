<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akses Perangkat - Absensi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Face API JS -->
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <!-- HTML5 QR Code -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  
  <style>
    #video-container { position: relative; display: flex; justify-content: center; align-items: center; background: #000; border-radius: 12px; overflow: hidden; width: 100%; max-width: 400px; height: 300px; margin: 0 auto; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
    #videoElement { width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .step-box { padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; background: #f8fafc; }
    .status-ok { color: #16a34a; font-weight: bold; }
    .status-wait { color: #d97706; font-weight: bold; }
    .status-fail { color: #dc2626; font-weight: bold; }
  </style>
</head>
<body class="bg-gray-100 p-4 font-sans text-gray-800 min-h-screen flex items-center justify-center">

  <div class="max-w-md w-full mx-auto bg-white rounded-2xl shadow-xl overflow-hidden p-6 text-center border border-gray-100">
    <h1 class="text-2xl font-black text-gray-800 mb-1">Verifikasi Biometrik</h1>
    <p class="text-sm text-blue-600 mb-6 font-bold" id="action-title">Menghubungkan ke Sistem...</p>
    
    <div id="video-container" class="mb-6 border-2 border-gray-200">
      <video id="videoElement" autoplay muted playsinline></video>
      <div id="qr-reader" style="position:absolute; top:0; left:0; width:100%; height:100%; display:none; background:#fff;"></div>
    </div>

    <!-- Papan Monitor Status Perangkat & Lokasi -->
    <div class="text-left space-y-3">
      <div class="step-box space-y-2">
        <div class="flex justify-between items-center">
          <span class="text-sm font-semibold text-gray-600">Kamera & AI Model</span>
          <span id="st-cam" class="status-wait text-sm">Menghidupkan...</span>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-sm font-semibold text-gray-600">Satelit GPS</span>
          <span id="st-gps" class="status-wait text-sm">Mencari Sinyal...</span>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-sm font-semibold text-gray-600">Identitas Wajah</span>
          <span id="st-face" class="status-wait text-sm">Menunggu Wajah...</span>
        </div>
        <div id="qr-section" class="flex justify-between items-center hidden">
          <span class="text-sm font-semibold text-gray-600">QR Code</span>
          <span id="st-qr" class="status-wait text-sm">Mencari Kode QR...</span>
        </div>
      </div>
    </div>

    <button id="btn-action" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 px-4 rounded-xl mt-6 opacity-50 cursor-not-allowed shadow-lg transition" disabled>
      Menyiapkan Sensor...
    </button>
  </div>

  <script>
    // --- GLOBAL ERROR CATCHER ---
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      const titleEl = document.getElementById('action-title');
      if (titleEl) {
        titleEl.innerText = "CRASH SISTEM: " + msg + " (Baris: " + lineNo + ")";
        titleEl.className = "text-sm text-red-600 mb-6 font-black";
      }
      return false;
    };

    // --- INISIALISASI UTAMA ---
    try {
      const urlParams = new URLSearchParams(window.location.search);
      const ACTION = urlParams.get('action'); 
      const USER_ID = urlParams.get('userId');
      const NAMA = urlParams.get('nama');
      const API_URL = urlParams.get('api');
      const REG_DESCRIPTOR_STR = urlParams.get('descriptor'); 

      if(!USER_ID || !API_URL) {
        alert("Akses ditolak! Harap buka halaman ini melalui Portal Utama Absensi.");
        window.close();
      } else {
        const payload = {
          action: ACTION === 'register' ? 'register_wajah' : 'submit_absen',
          userId: USER_ID,
          nama: NAMA,
          tipe: ACTION === 'absen_masuk' ? 'Masuk' : (ACTION === 'absen_pulang' ? 'Pulang' : null),
          lat: null, lng: null, accuracy: null, descriptor: null, fotoBase64: null,
          qrResult: 'Tanpa QR', deviceInfo: navigator.userAgent, browserInfo: navigator.platform
        };

        const readableAction = ACTION === 'register' ? 'Registrasi Wajah Baru' : `Presensi Kehadiran ${payload.tipe}`;
        document.getElementById('action-title').innerText = `${readableAction} : ${NAMA}`;
        document.getElementById('action-title').className = "text-sm text-blue-600 mb-6 font-bold";

        if (ACTION !== 'register') {
          document.getElementById('qr-section').classList.remove('hidden');
        }

        let registeredDescriptor = null;
        if (ACTION !== 'register' && REG_DESCRIPTOR_STR) {
           try {
              registeredDescriptor = new Float32Array(JSON.parse(REG_DESCRIPTOR_STR));
           } catch(e) {
              console.error("Gagal membaca descriptor biometrik", e);
           }
        }

        let isModelsLoaded = false;
        let isCameraReady = false;
        const video = document.getElementById('videoElement');
        const btnAction = document.getElementById('btn-action');

        startCamera();
        if(ACTION !== 'register') {
           getGPSLocation();
        }

        loadAIModels();

        async function loadAIModels() {
          const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models'; 
          try {
            await Promise.all([
              faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
              faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
              faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            isModelsLoaded = true;
            if(isCameraReady) {
              document.getElementById('st-cam').innerText = "Kamera & AI Siap";
              document.getElementById('st-cam').className = "status-ok";
            }
          } catch (err) {
            document.getElementById('action-title').innerText = "Koneksi Lemah: Gagal memuat AI Model";
            document.getElementById('action-title').className = "text-sm text-red-600 mb-6 font-bold";
            alert("Gagal mengunduh AI. Pastikan internet stabil dan tidak diblokir.");
          }
        }

        function startCamera() {
          navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => {
              video.srcObject = stream;
              isCameraReady = true;
              if(isModelsLoaded) {
                 document.getElementById('st-cam').innerText = "Kamera & AI Siap";
                 document.getElementById('st-cam').className = "status-ok";
              } else {
                 document.getElementById('st-cam').innerText = "Kamera Aktif, Memuat AI...";
                 document.getElementById('st-cam').className = "status-wait";
              }
            })
            .catch(err => {
              document.getElementById('st-cam').innerText = "Akses Kamera Ditolak";
              document.getElementById('st-cam').className = "status-fail";
              alert("Aplikasi membutuhkan izin kamera untuk memverifikasi wajah.");
            });
        }

        // --- PERBAIKAN: JARING PENGAMAN LOKASI PALSU ---
        function getGPSLocation() {
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              (position) => {
                const acc = position.coords.accuracy;
                
                // Jika akurasi > 500 meter, ini PASTI lokasi tiang sinyal/IP Jakarta, BUKAN Satelit GPS.
                if (acc > 500) {
                    document.getElementById('st-gps').innerText = `Akurasi Buruk (${Math.round(acc)}m)`;
                    document.getElementById('st-gps').className = "status-fail animate-pulse";
                    alert("LOKASI TIDAK VALID!\n\nSistem mendeteksi browser Anda menggunakan titik tiang sinyal Provider Internet / IP (Akurasi " + Math.round(acc) + "m), bukan Satelit GPS asli. Ini membuat titik Anda 'nyasar' ke kota lain.\n\nSOLUSI:\n1. Pastikan GPS/Lokasi HP dalam keadaan MENYALA (Akurasi Tinggi).\n2. Berdirilah di luar ruangan / dekat jendela.\n3. Muat ulang (Refresh) halaman ini.");
                } else {
                    payload.lat = position.coords.latitude;
                    payload.lng = position.coords.longitude;
                    payload.accuracy = acc;
                    document.getElementById('st-gps').innerText = `Terkunci (Akurasi: ±${Math.round(payload.accuracy)}m)`;
                    document.getElementById('st-gps').className = "status-ok";
                    checkReadyState();
                }
              },
              (error) => {
                document.getElementById('st-gps').innerText = "GPS Gagal";
                document.getElementById('st-gps').className = "status-fail";
              },
              { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
            );
          }
        }

        video.addEventListener('play', () => {
          const canvas = faceapi.createCanvasFromMedia(video);
          document.getElementById('video-container').append(canvas);
          const displaySize = { width: video.clientWidth, height: video.clientHeight };
          faceapi.matchDimensions(canvas, displaySize);

          setInterval(async () => {
            if(!isModelsLoaded) return;
            
            try {
              const detections = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
              const ctx = canvas.getContext('2d');
              ctx.clearRect(0, 0, canvas.width, canvas.height);

              if (detections) {
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                faceapi.draw.drawDetections(canvas, resizedDetections);
                payload.descriptor = Array.from(detections.descriptor);
                
                const picCanvas = document.createElement('canvas');
                picCanvas.width = video.videoWidth; picCanvas.height = video.videoHeight;
                picCanvas.getContext('2d').drawImage(video, 0, 0);
                payload.fotoBase64 = picCanvas.toDataURL('image/jpeg');

                let isFaceValid = false;

                if (ACTION !== 'register' && registeredDescriptor) {
                   const distance = faceapi.euclideanDistance(detections.descriptor, registeredDescriptor);
                   if (distance <= 0.55) { 
                      document.getElementById('st-face').innerText = "Wajah Terverifikasi Sesuai!";
                      document.getElementById('st-face').className = "status-ok";
                      isFaceValid = true;
                   } else {
                      document.getElementById('st-face').innerText = "Wajah Tidak Cocok!";
                      document.getElementById('st-face').className = "status-fail animate-pulse";
                      isFaceValid = false;
                   }
                } else {
                   document.getElementById('st-face').innerText = "Wajah Terdeteksi";
                   document.getElementById('st-face').className = "status-ok";
                   isFaceValid = true;
                }

                if (isFaceValid) {
                   checkReadyState();
                } else {
                   disableButton("Wajah Tidak Sesuai Data");
                }
              } else {
                document.getElementById('st-face').innerText = "Mencari Wajah...";
                document.getElementById('st-face').className = "status-wait";
                disableButton("Mencari Wajah...");
              }
            } catch(errorLoop) {
              console.error(errorLoop);
            }
          }, 1000);
        });

        function checkReadyState() {
          if(ACTION === 'register') {
            if(payload.descriptor) enableButton("Simpan Data Wajah");
          } else {
            // Tombol Kirim TIDAK AKAN NYALA jika koordinat belum tervalidasi (Akurasi < 500m)
            if(payload.descriptor && payload.lat) enableButton("Kirim Data Absensi");
          }
        }

        function enableButton(text) {
          btnAction.innerText = text; btnAction.disabled = false;
          btnAction.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-gray-400');
          btnAction.classList.add('bg-blue-600', 'hover:bg-blue-700', 'animate-pulse');
          btnAction.onclick = submitData;
        }

        function disableButton(customText) {
          btnAction.innerText = customText; btnAction.disabled = true;
          btnAction.classList.add('opacity-50', 'cursor-not-allowed', 'bg-gray-400');
          btnAction.classList.remove('bg-blue-600', 'hover:bg-blue-700', 'animate-pulse');
        }

        async function submitData() {
          btnAction.innerText = "Mengirim data..."; btnAction.disabled = true; btnAction.classList.remove('animate-pulse');
          try {
            const response = await fetch(API_URL, {
              method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, 
              body: JSON.stringify(payload)
            });
            const result = await response.json();
            if(result.status === 'success') {
              alert("BERHASIL: " + result.message); window.close(); 
            } else {
              alert("GAGAL: " + result.message); enableButton("Coba Lagi");
            }
          } catch(err) {
            alert("Terjadi kesalahan koneksi saat mengirim data."); enableButton("Coba Lagi");
          }
        }
      }
    } catch (criticalError) {
      document.getElementById('action-title').innerText = "CRASH: " + criticalError.message;
      document.getElementById('action-title').className = "text-sm text-red-600 mb-6 font-black";
    }
  </script>
</body>
</html>
